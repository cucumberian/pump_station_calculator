# 5. Перекачка поверхностного стока

## 5.1. Перекачка незарегулированного дождевого стока

![Рис. 3. Схема 1 перекачки полного объёма незарегулированного дождевого стока](static/img/scheme-5.1.png)

**Рис. 3.** Схема 1 перекачки полного объёма незарегулированного дождевого стока.

- 10 – насосная станция
- 11 – напорный трубопровод перекачки стока в аккумулирующий резервуар

Рабочий объём резервуара насосной станции $W_{нс}$ при выбранной максимальной производительности насосов в насосной станции $Q_{нс}$ (см. рис. 3) рассчитывается подбором по формуле (1) Приложения 8 рекомендаций:

$$
W_{нс} = \frac{0{,}06 \cdot Q_r \cdot t_r}{2-n} \left[ \left(\frac{T_{к}^{нс}}{t_r}\right)^{2-n} - \left(\frac{T_{н}^{нс}}{t_r}\right)^{2-n} - \left(\frac{T_{к}^{нс}}{t_r} - 1\right)^{2-n} - \frac{Q_{нс}}{Q_r} \cdot \left(\frac{T_{к}^{нс}}{t_r} - \frac{T_{н}^{нс}}{t_r}\right) \cdot (2-n) \right], \ \text{м}^3
$$

где:

- $W_{нс}$ – рабочий объём резервуара насосной станции, м³;
- $Q_{нс}$ – максимальная производительность насосов в насосной станции, л/с;
- $T_{н}^{нс}$ – момент времени, при котором расход дождевого стока, поступающего в насосную станцию, начинает превышать её максимальную производительность, мин;
- $T_{к}^{нс}$ – момент времени, при котором расход дождевого стока, поступающего в насосную станцию, перестаёт превышать её максимальную производительность, мин.

Примем для примера величину максимальной производительности насосов насосной станции $Q_{нс} = 100$ л/с.

Величина $T_{н}^{нс}$ рассчитывается по формуле (2) Приложения 8 рекомендаций:

$$
T_{н}^{нс} = t_r \cdot \left(\frac{Q_{нс}}{Q_r}\right)^{\frac{1}{1-n}} = 10 \cdot \left(\frac{100}{342{,}3}\right)^{\frac{1}{1-0{,}71}} = 0{,}14 \ \text{мин}.
$$

Величина $T_{к}^{нс}$ рассчитывается подбором по формуле (3) Приложения 8 рекомендаций:

$$
Q_{нс} = Q_r \cdot \left[\left(\frac{T_{к}^{нс}}{t_r}\right)^{1-n} - \left(\frac{T_{к}^{нс}}{t_r} - 1\right)^{1-n}\right] = 342{,}3 \cdot \left[\left(\frac{T_{к}^{нс}}{10}\right)^{1-0{,}71} - \left(\frac{T_{к}^{нс}}{10} - 1\right)^{1-0{,}71}\right]
$$

В результате подбора установлено $T_{к}^{нс} = 15{,}61$ мин. Подставляя указанное значение, а также значение $T_{н}^{нс} = 0{,}14$ мин. в формулу (1) вычисляем:

$$
\begin{aligned} W_{нс} = \frac{0{,}06 \cdot 342{,}3 \cdot 10}{2-0{,}71} \cdot \Big[ &\left(\frac{15{,}61}{10}\right)^{2-0{,}71} - \left(\frac{0{,}14}{10}\right)^{2-0{,}71} - \left(\frac{15{,}61}{10} - 1\right)^{2-0{,}71} - \\\\ &- \frac{100}{342{,}3} \cdot \left(\frac{15{,}61}{10} - \frac{0{,}14}{10}\right) \cdot (2-0{,}71) \Big] = 113{,}8 \ \text{м}^3 \end{aligned}
$$

Аналогичный расчёт с другими значениями производительности $Q_{нс}$:

| $Q_{нс}$, л/с | 110 | 120 | 130 | 140 | 150 | 200 |
|---|---|---|---|---|---|---|
| $W_{нс}$, м³ | 104,9 | 96,6 | 88,9 | 81,6 | 74,7 | 44,4 |

---

*Источник: «Пример расчёта количественных характеристик поверхностного стока…», ФГУП «НИИ ВОДГЕО», Москва, 2006, стр. 13.*
