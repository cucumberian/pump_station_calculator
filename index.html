<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>КНС · п. 5.1 — Перекачка незарегулированного дождевого стока</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script defer src="app.js"></script>
</head>

<body>
  <header>
    <div>
      <h1>Насосная станция · подбор параметров</h1>
      <p>Перекачка незарегулированного дождевого стока</p>
    </div>

    <div class="header-btns">
      <button class="btn" id="share" type="button" title="Поделиться ссылкой с текущими параметрами">Поделиться</button>
      <a class="btn" href="method.html" title="Открыть страницу из методического пособия">Документация</a>
    </div>

  </header>

  <main>
    <section class="panel inputs">
      <h2>Исходные данные</h2>

      <div class="field" title="максимальный расчётный расход дождевых вод в коллекторе дождевой канализации в расчётном участке, л/с">
        <label for="Qr">Q<sub>r</sub> — макс. расход дождевого стока, л/с</label>
        <input id="Qr" type="number" step="any" min="1" value="342.3">
      </div>
      <div class="field" title="расчетная продолжительность дождя, равная продолжительности протекания поверхностных вод по поверхности и трубам до расчетного участка, мин">
        <label for="tr">t<sub>r</sub> — расчётная продолжительность дождя, мин</label>
        <div class="tr-row">
          <input id="tr" type="number" step="any" min="1" value="10">
          <div class="tr-btns">
            <button class="btn" id="trMinus" type="button">− час</button>
            <button class="btn" id="trPlus" type="button">+ час</button>
          </div>
        </div>
      </div>
      <div class="field" title="параметр, характеризующий интенсивность и продолжительность дождя для конкретной местности">
        <label for="n">n — климатический параметр</label>
        <input id="n" type="number" step="any" min="0.01" max="0.99" value="0.71">
        <input id="nrange" type="range" min="0.01" max="0.99" step="0.01" value="0.71">
      </div>

      <div class="field" title="максимальная производительности насосов в насосной станции, л/с">
        <label for="Q">Q<sub>нс</sub> — производительность насосной станции, л/с</label>
        <div class="dual">
          <input id="Q" type="number" step="any" min="1" value="100">
          <span class="dual-eq">=</span>
          <input id="Qm3h" type="number" step="any" min="3.6" value="360" title="Qнс, м³/ч">
          <span class="dual-unit">м³/ч</span>
        </div>
        <input id="Qrange" type="range" min="1" max="342.3" step="0.5" value="100">
      </div>
      <p class="hint" id="Qhint"></p>

      <div class="scheme" id="scheme">
        <h2 id="schemeToggle">График стока Q(T) <span class="scheme-arrow">▾</span></h2>
        <img src="scheme-qt.png" alt="График дождевого стока Q(T): рабочий объём резервуара насосной станции Wнс">
      </div>
    </section>

    <div class="right panel">
      <section class="results" id="results">
        <h2 id="resultsToggle">Результаты <span class="scheme-arrow">▾</span></h2>
        <div id="cards" class="cards"></div>
      </section>

      <section class="chart-panel">
        <h2>Подбор: производительность нс ↔ рабочий объём резервуара нс </h2>
        <div class="chart-wrap"><canvas id="chart"></canvas></div>
        <div class="chart-wrap"><canvas id="chartQT"></canvas></div>
      </section>

      <section class="table-panel">
        <h2>Таблица вариантов</h2>
        <div class="range-controls">
          <div class="field"><label for="vFrom">Q<sub>нс</sub> от, л/с</label><input id="vFrom" type="number" step="any"
              min="1" value="43"></div>
          <div class="field"><label for="vTo">до, л/с</label><input id="vTo" type="number" step="any" min="1" value="342">
          </div>
          <div class="field"><label for="vStep">шаг, л/с</label><input id="vStep" type="number" step="any" min="0.5"
              value="43"></div>
        </div>
        <div class="table-wrap">
          <table id="variants">
            <thead>
              <tr>
                <th>Q<sub>нс</sub>, л/с</th>
                <th>Q<sub>нс</sub>, м³/ч</th>
                <th>T<sub>н</sub>, мин</th>
                <th>T<sub>к</sub>, мин</th>
                <th>W<sub>нс</sub>, м³</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <div id="selfcheck" hidden></div>

  <div id="modal" class="modal" hidden>
    <div class="modal-box">
      <button id="modalClose" class="modal-close" type="button" aria-label="Закрыть">×</button>
      <div id="modalBody"></div>
    </div>
  </div>
</body>

</html>
